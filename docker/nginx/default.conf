# =============================================================================
# Nginx / OpenResty 反向代理参考配置
#
# 注意：Next.js standalone 容器（docker/frontend/Dockerfile）直接运行
# `node server.js`，不再使用 nginx 托管静态文件。本文件未被任何 Docker
# 容器直接引用，仅作为 1Panel / OpenResty 网站反向代理的参考模板：
#
#   - 将所有请求反代到 Next.js server（frontend:3000）
#   - Next.js 内部 rewrites 会将 /api/* 进一步代理到后端 Express（backend:3000）
#   - /_next/static/ 长缓存（带哈希的静态资源）
#
# 在 1Panel 中创建网站时，将代理地址指向 Next.js 容器映射的宿主机端口
# （如 http://127.0.0.1:8080），由 1Panel/OpenResty 统一接管 TLS/HTTPS。
# =============================================================================

server {
  listen 80;
  server_name _;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # 客户端缓存 Next.js 静态资源（带哈希，可长期缓存）
  location /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 反代所有请求到 Next.js server（standalone）。
  # Next.js 的 rewrites 会将 /api/* 进一步代理到后端 Express。
  # 不再需要 try_files ... /index.html 的 SPA fallback（Next.js 自带 404 处理）。
  location / {
    proxy_pass http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
