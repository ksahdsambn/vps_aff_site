services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

  migrate:
    build:
      context: ./backend
      target: builder
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DATABASE_USER: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_NAME: ${MYSQL_DATABASE}
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/scripts/seedRuntime.js"]
    restart: "no"
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
      DATABASE_USER: ${MYSQL_USER}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD}
      DATABASE_NAME: ${MYSQL_DATABASE}
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        # 构建时后端地址，用于 SSG 预渲染（Docker 网络内服务名）
        BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    environment:
      # 运行时 Next.js 服务端 fetch / rewrites 代理的后端地址
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://xmde.de}
      NEXT_PUBLIC_GSC_VERIFICATION: ${NEXT_PUBLIC_GSC_VERIFICATION:-}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-80}:3000"
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
